name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-and-bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Test Flutter app
        run: flutter test

      - name: Install bridge server dependencies
        working-directory: bridge_server
        run: dart pub get

      - name: Test bridge server
        working-directory: bridge_server
        run: dart test
